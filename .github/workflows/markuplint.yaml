name: CI - Markup Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  markuplint:
    name: Run Markuplint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install pnpm
        run: corepack enable && pnpm install

      - name: Run Markuplint
        run: pnpm lint:markup
